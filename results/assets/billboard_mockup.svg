<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- City silhouette -->
  <rect x="0" y="350" width="800" height="150" fill="#2C3E50"/>
  <rect x="50" y="300" width="60" height="200" fill="#34495E"/>
  <rect x="140" y="270" width="50" height="230" fill="#2C3E50"/>
  <rect x="220" y="310" width="70" height="190" fill="#34495E"/>
  <rect x="320" y="250" width="55" height="250" fill="#2C3E50"/>
  <rect x="410" y="290" width="65" height="210" fill="#34495E"/>
  <rect x="510" y="260" width="50" height="240" fill="#2C3E50"/>
  <rect x="590" y="300" width="60" height="200" fill="#34495E"/>
  <rect x="680" y="280" width="70" height="220" fill="#2C3E50"/>
  <!-- Billboard frame -->
  <rect x="150" y="120" width="500" height="230" rx="8" fill="#F9F6F0" stroke="#3D2314" stroke-width="4"/>
  <rect x="160" y="130" width="480" height="210" rx="4" fill="#3D2314"/>
  <!-- Billboard content -->
  <rect x="170" y="140" width="460" height="190" rx="2" fill="#F9F6F0"/>
  <!-- Cookie product in billboard -->
  <circle cx="340" cy="235" r="55" fill="#D4A34A"/>
  <circle cx="340" cy="235" r="55" fill="none" stroke="#A07020" stroke-width="3"/>
  <ellipse cx="310" cy="215" rx="6" ry="4" fill="#3D2314" transform="rotate(-20 310 215)"/>
  <ellipse cx="360" cy="220" rx="5" ry="4" fill="#3D2314" transform="rotate(15 360 220)"/>
  <ellipse cx="330" cy="260" rx="6" ry="4" fill="#3D2314"/>
  <ellipse cx="375" cy="250" rx="5" ry="3" fill="#3D2314" transform="rotate(25 375 250)"/>
  <ellipse cx="305" cy="245" rx="4" ry="3" fill="#3D2314" transform="rotate(-10 305 245)"/>
  <!-- Billboard headline -->
  <text x="480" y="210" text-anchor="middle" font-family="Outfit, sans-serif" font-size="28" font-weight="700" fill="#3D2314">NOUVEAU</text>
  <text x="480" y="250" text-anchor="middle" font-family="Outfit, sans-serif" font-size="22" font-weight="600" fill="#D49A36">COOKIES</text>
  <text x="480" y="280" text-anchor="middle" font-family="Outfit, sans-serif" font-size="16" fill="#3D2314">Banane · Coco · Caramel</text>
  <!-- Billboard legs -->
  <rect x="250" y="350" width="12" height="60" fill="#7F8C8D"/>
  <rect x="538" y="350" width="12" height="60" fill="#7F8C8D"/>
  <!-- Base -->
  <rect x="230" y="400" width="340" height="10" rx="2" fill="#7F8C8D"/>
  <!-- Brand tagline -->
  <text x="400" y="480" text-anchor="middle" font-family="Outfit, sans-serif" font-size="18" font-weight="600" fill="#F9F6F0">GROUPE BIMO</text>
  <text x="400" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#BDC3C7">Biscuiterie · Chocolaterie · Gaufretterie</text>
</svg>
