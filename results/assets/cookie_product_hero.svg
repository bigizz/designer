<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="cookieBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D49A36"/>
      <stop offset="100%" stop-color="#3D2314"/>
    </radialGradient>
    <radialGradient id="cookieSurface" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E8C47A"/>
      <stop offset="60%" stop-color="#D4A34A"/>
      <stop offset="100%" stop-color="#B8862E"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#cookieBg)" rx="12"/>
  <!-- Cookie body -->
  <ellipse cx="200" cy="210" rx="130" ry="120" fill="url(#cookieSurface)"/>
  <ellipse cx="200" cy="210" rx="130" ry="120" fill="none" stroke="#A07020" stroke-width="4"/>
  <!-- Chocolate chips -->
  <ellipse cx="150" cy="170" rx="14" ry="10" fill="#3D2314" transform="rotate(-15 150 170)"/>
  <ellipse cx="240" cy="180" rx="12" ry="9" fill="#3D2314" transform="rotate(10 240 180)"/>
  <ellipse cx="180" cy="250" rx="13" ry="11" fill="#3D2314" transform="rotate(-5 180 250)"/>
  <ellipse cx="270" cy="230" rx="11" ry="8" fill="#3D2314" transform="rotate(20 270 230)"/>
  <ellipse cx="130" cy="220" rx="10" ry="8" fill="#3D2314" transform="rotate(-25 130 220)"/>
  <ellipse cx="200" cy="160" rx="9" ry="7" fill="#3D2314"/>
  <ellipse cx="220" cy="260" rx="8" ry="6" fill="#3D2314" transform="rotate(30 220 260)"/>
  <!-- Coconut flakes -->
  <ellipse cx="170" cy="200" rx="5" ry="3" fill="#F9F6F0" opacity="0.7" transform="rotate(45 170 200)"/>
  <ellipse cx="230" cy="210" rx="4" ry="2" fill="#F9F6F0" opacity="0.7" transform="rotate(-30 230 210)"/>
  <ellipse cx="190" cy="230" rx="5" ry="3" fill="#F9F6F0" opacity="0.6" transform="rotate(10 190 230)"/>
  <!-- Caramel drizzle -->
  <path d="M160 190 Q180 200 175 220" stroke="#F4D03F" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M230 200 Q250 215 240 240" stroke="#F4D03F" stroke-width="3" fill="none" opacity="0.8"/>
  <!-- Text label -->
  <text x="200" y="360" text-anchor="middle" font-family="Outfit, sans-serif" font-size="22" font-weight="700" fill="#F9F6F0">BANANE · COCO · CARAMEL</text>
</svg>
