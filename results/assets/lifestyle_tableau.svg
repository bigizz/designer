<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A36A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <radialGradient id="lightRay" cx="30%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFF9E6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFF9E6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background wall -->
  <rect width="600" height="280" fill="#F5E6D3"/>
  <!-- Sunlight ray -->
  <rect width="600" height="280" fill="url(#lightRay)"/>
  <!-- Table surface -->
  <rect x="0" y="260" width="600" height="140" fill="url(#tableGrad)"/>
  <rect x="0" y="260" width="600" height="6" fill="#C49A3C" opacity="0.5"/>
  <!-- Coffee cup -->
  <rect x="80" y="230" width="50" height="45" rx="4" fill="#F9F6F0" stroke="#D4A36A" stroke-width="2"/>
  <ellipse cx="105" cy="230" rx="28" ry="6" fill="#F9F6F0" stroke="#D4A36A" stroke-width="2"/>
  <ellipse cx="105" cy="230" rx="20" ry="4" fill="#3D2314"/>
  <!-- Cup handle -->
  <path d="M130 245 Q150 245 145 260 Q140 270 130 265" fill="none" stroke="#D4A36A" stroke-width="2.5"/>
  <!-- Steam -->
  <path d="M95 220 Q100 210 95 200" stroke="#D49A36" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M110 218 Q115 208 110 198" stroke="#D49A36" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- Cookie on table -->
  <ellipse cx="280" cy="290" rx="60" ry="20" fill="#D4A34A"/>
  <ellipse cx="280" cy="290" rx="60" ry="20" fill="none" stroke="#A07020" stroke-width="2.5"/>
  <ellipse cx="260" cy="283" rx="5" ry="3" fill="#3D2314" transform="rotate(-15 260 283)"/>
  <ellipse cx="300" cy="286" rx="5" ry="3" fill="#3D2314" transform="rotate(10 300 286)"/>
  <ellipse cx="275" cy="298" rx="4" ry="3" fill="#3D2314"/>
  <ellipse cx="310" cy="295" rx="4" ry="2" fill="#3D2314"/>
  <ellipse cx="250" cy="290" rx="3" ry="2" fill="#3D2314"/>
  <!-- Cookie crumbs -->
  <circle cx="340" cy="295" r="2" fill="#D4A34A" opacity="0.6"/>
  <circle cx="355" cy="290" r="1.5" fill="#D4A34A" opacity="0.5"/>
  <circle cx="225" cy="285" r="1.5" fill="#D4A34A" opacity="0.6"/>
  <circle cx="335" cy="305" r="1" fill="#D4A34A" opacity="0.4"/>
  <!-- Cookie bag/packaging -->
  <rect x="420" y="240" width="80" height="100" rx="6" fill="#3D2314"/>
  <rect x="425" y="245" width="70" height="30" rx="4" fill="#D49A36"/>
  <text x="460" y="265" text-anchor="middle" font-family="Outfit, sans-serif" font-size="12" font-weight="700" fill="#3D2314">BIMO</text>
  <text x="460" y="315" text-anchor="middle" font-family="Outfit, sans-serif" font-size="10" font-weight="600" fill="#F9F6F0">COOKIES</text>
  <!-- Banana on table -->
  <path d="M470 285 Q510 275 540 290 Q530 300 500 295 Q480 290 470 285Z" fill="#F4D03F" stroke="#D49A36" stroke-width="1"/>
  <ellipse cx="473" cy="286" rx="5" ry="3" fill="#8B6914" opacity="0.5"/>
  <!-- Text overlay -->
  <text x="300" y="370" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" font-weight="600" fill="#F9F6F0">Le plaisir authentique au quotidien</text>
</svg>
