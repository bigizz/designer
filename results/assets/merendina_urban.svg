<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#E30613"/>
  <!-- Abstract urban background -->
  <polygon points="0,0 1080,0 1080,400 0,600" fill="#1A1A1A"/>
  <rect x="100" y="200" width="300" height="800" fill="#333333"/>
  <rect x="500" y="350" width="400" height="700" fill="#222222"/>
  
  <!-- Flash photography effect -->
  <circle cx="540" cy="540" r="500" fill="url(#flashGradient)"/>
  <defs>
    <radialGradient id="flashGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Merendina Mockup Placeholder -->
  <rect x="340" y="440" width="400" height="200" rx="20" fill="#8B4513" stroke="#FFFFFF" stroke-width="5"/>
  <rect x="340" y="440" width="400" height="200" rx="20" fill="url(#chocolate)" />
  <defs>
    <linearGradient id="chocolate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B3E2E"/>
      <stop offset="100%" stop-color="#3A2015"/>
    </linearGradient>
  </defs>
  <text x="540" y="560" font-family="sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle" font-style="italic">MERENDINA</text>
  
  <!-- Typographic Overlay -->
  <text x="540" y="100" font-family="sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle" letter-spacing="10">URBAN PULSE</text>
  <text x="540" y="150" font-family="sans-serif" font-size="20" fill="#FFD700" text-anchor="middle" letter-spacing="2">THE TASTE OF THE STREETS</text>
</svg>
