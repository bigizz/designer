<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1920" fill="#0056A4"/>
  
  <!-- Dynamic lines for "Crunch" and action -->
  <line x1="0" y1="0" x2="1080" y2="1920" stroke="#FFFFFF" stroke-width="20" opacity="0.2"/>
  <line x1="1080" y1="0" x2="0" y2="1920" stroke="#FFFFFF" stroke-width="20" opacity="0.2"/>
  
  <!-- Tonik Wafer Mockup (Snapped in half) -->
  <g transform="translate(400, 600) rotate(-15)">
    <rect x="-150" y="-300" width="300" height="400" fill="#FFD700" stroke="#8B4513" stroke-width="5"/>
    <rect x="-150" y="-280" width="300" height="20" fill="#8B4513"/>
    <rect x="-150" y="-240" width="300" height="20" fill="#8B4513"/>
    <text x="0" y="-100" font-family="sans-serif" font-size="70" font-weight="900" fill="#0056A4" text-anchor="middle">TONIK</text>
  </g>
  
  <g transform="translate(600, 1100) rotate(20)">
    <rect x="-150" y="-100" width="300" height="300" fill="#FFD700" stroke="#8B4513" stroke-width="5"/>
    <rect x="-150" y="-80" width="300" height="20" fill="#8B4513"/>
    <rect x="-150" y="-40" width="300" height="20" fill="#8B4513"/>
  </g>

  <!-- Crumb particles -->
  <circle cx="500" cy="900" r="10" fill="#FFD700"/>
  <circle cx="550" cy="950" r="15" fill="#8B4513"/>
  <circle cx="450" cy="1000" r="8" fill="#FFD700"/>
  <circle cx="600" cy="850" r="12" fill="#8B4513"/>
  
  <!-- Typographic Overlay -->
  <text x="540" y="200" font-family="sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle" letter-spacing="10">THE CRUNCH</text>
  <text x="540" y="260" font-family="sans-serif" font-size="30" fill="#FFD700" text-anchor="middle" letter-spacing="5">SENSORY TEXTURE</text>
</svg>
